name: trusight
description: "AI Media Authenticator and Forensic Detector."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  dio: ^5.8.0
  http: ^1.3.0
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  video_compress: ^3.1.2
  video_player: ^2.9.2
  record: ^6.2.1
  audioplayers: ^6.1.0
  google_fonts: ^8.2.0
  percent_indicator: ^4.2.4
  flutter_spinkit: ^5.2.1
  shared_preferences: ^2.5.2
  lottie: ^3.3.1
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/trusight_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#080B10"
  adaptive_icon_foreground: "assets/images/trusight_logo.png"

flutter_native_splash:
  color: "#080B10"
  image: assets/images/app_icon_foreground.png
  android_12:
    color: "#080B10"
    image: assets/images/app_icon_foreground.png
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/trusight_logo.png
    - assets/images/app_icon_foreground.png
